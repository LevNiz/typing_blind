version: '3.8'

# Development docker-compose with hot reload
# Usage: docker-compose -f docker-compose.dev.yml up

services:
  postgres:
    image: postgres:15-alpine
    container_name: typing_trainer_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-typing_trainer}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - typing_trainer_network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: typing_trainer_api
    entrypoint: ["/bin/sh", "-c"]
    command: |
      set -e
      echo "Waiting for database to be ready..."
      until pg_isready -h postgres -p 5432 -U postgres -d typing_trainer; do
        echo "Database is unavailable - sleeping"
        sleep 1
      done
      echo "Database is ready! Running migrations..."
      alembic upgrade head
      echo "Starting application..."
      exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app  # Hot reload для разработки
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/typing_trainer}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost:80}
      - DEBUG=${DEBUG:-true}
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - typing_trainer_network

volumes:
  postgres_data:

networks:
  typing_trainer_network:
    driver: bridge

