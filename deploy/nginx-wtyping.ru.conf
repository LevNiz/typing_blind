# Nginx config for wtyping.ru (host reverse proxy + SSL)
# Размещение в публичном репозитории безопасно: здесь нет паролей и секретов.
# На сервере: скопировать в /etc/nginx/sites-available/ и сделать symlink в sites-enabled.

# Редирект HTTP -> HTTPS и доступ для certbot (ACME challenge)
server {
    listen 80;
    listen [::]:80;
    server_name wtyping.ru www.wtyping.ru;

    # Certbot: проверка владения доменом (не удалять при использовании certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wtyping.ru www.wtyping.ru;

    # Сертификаты (certbot создаёт после: certbot certonly --webroot ...)
    ssl_certificate     /etc/letsencrypt/live/wtyping.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wtyping.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Логи
    access_log /var/log/nginx/wtyping.ru.access.log;
    error_log  /var/log/nginx/wtyping.ru.error.log;

    # Проксирование на контейнер фронта (на сервере маппинг порта: 8080:80)
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
